name: Create Docs Version

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Docusaurus version snapshot
        run: npm run docusaurus docs:version ${{ steps.version.outputs.version }}

      - name: Commit versioned docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versioned_docs/ versioned_sidebars/ versions.json
          git commit -m "docs: snapshot version ${{ steps.version.outputs.version }}"
          git push origin main
